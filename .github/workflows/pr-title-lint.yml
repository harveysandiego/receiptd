name: PR title lint

# Enforces the Conventional Commits format documented in CONTRIBUTING.md
# on the PR title, since that's what a squash-merge turns into the
# commit message .goreleaser.yml's changelog grouping keys off.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            chore
            ci
