name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Split out so both goreleaser and the container image share one test
  # run instead of each re-running (or, worse, one of them skipping) it.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - run: go test -race ./...

  goreleaser:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: stable

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: publish container image
    needs: test
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-image.yml
    with:
      push: true

  pkg-go-dev:
    name: notify pkg.go.dev
    needs: test
    runs-on: ubuntu-latest
    steps:
      # pkg.go.dev only indexes a version once something asks the Go module
      # proxy for it — it doesn't poll GitHub for new tags on its own. This
      # makes that first request automatically so the site picks up each
      # release without anyone needing to hit "Request" by hand.
      - run: curl -sf "https://proxy.golang.org/github.com/harveysandiego/receiptd/@v/${GITHUB_REF_NAME}.info"
