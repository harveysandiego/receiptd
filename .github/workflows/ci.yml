name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - name: Check gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$out"
            exit 1
          fi

  vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - run: go vet ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      # v7+ required: .golangci.yml uses the v2 config schema, and only
      # golangci-lint-action v7+ installs golangci-lint v2 (v6 and earlier
      # only understand the v1 config format/binary).
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: [stable, oldstable]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ matrix.go }}
      - name: go test
        run: go test ./... -v

      - name: go test -race
        run: go test -race ./...

      - name: Coverage
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-go-${{ matrix.go }}
          path: coverage.txt
          if-no-files-found: ignore

      # Only the "stable" leg uploads to Codecov — the matrix runs the same
      # tests against two Go versions, and uploading both would just merge
      # two near-identical reports for no benefit. fail_ci_if_error is
      # false so a Codecov outage can't fail this repo's own CI.
      - name: Upload coverage to Codecov
        if: matrix.go == 'stable'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  build:
    name: build (smoke)
    needs: [format, vet, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - run: go build ./...
